<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frutiger Aero</title>
    
    <!-- Favicon -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968890.png" type="image/png">
    <!-- Alternativ: Eigenes Favicon hochladen und so verwenden: -->
    <!-- <link rel="icon" href="favicon.png" type="image/png"> -->

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            background: #0a2a1f;
            padding-top: 100px; /* Platz für den Header */
        }

        /* Top Header - Sticky */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 255, 140, 0.28);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding: 18px 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
        }

        header h1 {
            color: white;
            font-size: 2.1rem;
            font-weight: 700;
            text-shadow: 0 3px 10px rgba(0, 0, 0, 0.4);
        }

        /* Buttons im Header */
        .buttons {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 14px 32px;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            background: rgba(0, 255, 180, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.4s ease;
            backdrop-filter: blur(12px);
            box-shadow: 
                0 8px 20px rgba(0, 0, 0, 0.3),
                inset 0 4px 10px rgba(255,255,255,0.35);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
        }

        .btn:hover {
            background: rgba(0, 255, 180, 0.55);
            transform: translateY(-4px);
            box-shadow: 
                0 12px 25px rgba(0, 255, 140, 0.4),
                inset 0 6px 12px rgba(255,255,255,0.5);
        }

        .btn:active {
            transform: scale(0.96);
        }

        /* Optionaler Hauptinhalt */
        .content {
            max-width: 1200px;
            margin: 80px auto;
            padding: 40px;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>Frutiger Aero</h1>
        
        <div class="buttons">
            <button class="btn">Home</button>
            <button class="btn">Über uns</button>
            <button class="btn">Kontakt</button>
        </div>
    </header>

    <div class="content">
        <h2>Deine Seite ist bereit!</h2>
        <p>Der Header ist jetzt oben fixiert und sieht glasig-grün aus.</p>
    </div>

</body>
</html>
