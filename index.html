<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frutiger Aero</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            background: #0a2a1f;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Header mit Glas-Effekt + grüner Bubble-Look */
        header {
            width: 90%;
            max-width: 1100px;
            background: rgba(0, 255, 140, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 32px;
            padding: 60px 40px;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.4),
                inset 0 8px 20px rgba(255, 255, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        /* Leichter Bubble-Hintergrund-Effekt */
        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(180,255,100,0.4) 0%, transparent 70%);
            opacity: 0.6;
            pointer-events: none;
        }

        header h1 {
            color: white;
            font-size: 3.2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 50px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 2;
        }

        /* Button Container */
        .buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        /* Frutiger Aero / Glass Buttons */
        .btn {
            padding: 22px 48px;
            font-size: 1.45rem;
            font-weight: 600;
            color: white;
            background: rgba(0, 255, 180, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.4s ease;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 
                0 10px 25px rgba(0, 0, 0, 0.3),
                inset 0 6px 12px rgba(255,255,255,0.4);
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
            min-width: 220px;
            text-align: center;
        }

        .btn:hover {
            background: rgba(0, 255, 180, 0.55);
            transform: translateY(-10px) scale(1.05);
            box-shadow: 
                0 20px 40px rgba(0, 255, 140, 0.4),
                inset 0 8px 15px rgba(255,255,255,0.6);
        }

        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <header>
        <h1>Willkommen</h1>
        
        <div class="buttons">
            <button class="btn">Button 1</button>
            <button class="btn">Button 2</button>
            <button class="btn">Button 3</button>
        </div>
    </header>

</body>
</html>
