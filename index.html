<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frutiger Aero</title>
    
    <!-- Favicon -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968890.png" type="image/png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            background: #0a2a1f;
            padding-top: 100px;
        }

        /* Top Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 255, 140, 0.28);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding: 18px 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
        }

        header h1 {
            color: white;
            font-size: 2.1rem;
            font-weight: 700;
            text-shadow: 0 3px 10px rgba(0, 0, 0, 0.4);
        }

        /* Bild-Buttons */
        .buttons {
            display: flex;
            gap: 25px;
        }

        .btn-link {
            display: block;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 
                0 8px 20px rgba(0, 0, 0, 0.35),
                inset 0 4px 10px rgba(255,255,255,0.3);
            transition: all 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .btn-link:hover {
            transform: translateY(-6px) scale(1.08);
            box-shadow: 
                0 15px 30px rgba(0, 255, 140, 0.45),
                inset 0 6px 12px rgba(255,255,255,0.5);
        }

        .btn-link img {
            width: 180px;
            height: 65px;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .btn-link:hover img {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header>
        <h1>Frutiger Aero</h1>
        
        <div class="buttons">
            <!-- Button 1 -->
            <a href="#" class="btn-link">
                <img src="https://via.placeholder.com/180x65/00ff8c/ffffff?text=HOME" alt="Home">
            </a>
            
            <!-- Button 2 -->
            <a href="#" class="btn-link">
                <img src="https://via.placeholder.com/180x65/00ff8c/ffffff?text=UEBER+UNS" alt="Über uns">
            </a>
            
            <!-- Button 3 -->
            <a href="#" class="btn-link">
                <img src="https://via.placeholder.com/180x65/00ff8c/ffffff?text=KONTAKT" alt="Kontakt">
            </a>
        </div>
    </header>

    <div style="max-width: 1200px; margin: 120px auto; padding: 40px; color: white; text-align: center;">
        <h2>✅ Bild-Buttons fertig</h2>
        <p>Ersetze die `src="..."` mit deinen eigenen Bild-URLs oder lokalen Dateien.</p>
    </div>

</body>
</html>
